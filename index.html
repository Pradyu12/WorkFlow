<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprint Analytics Engine</title>
    <!-- Tailwind CSS v3 Browser CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Clean inter google font & jetbrains mono -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <!-- Core React UMD Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Firebase Realtime Database compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <!-- Babel standalone to support live JSX compile in container live preview -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                bg: '#0B0C10',
                card: '#1F2833',
                accent: '#66FCF1',
                muted: '#45A29E',
                text: '#C5C6C7',
                heading: '#F1F1F1'
              }
            },
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0B0C10;
        color: #C5C6C7;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0B0C10;
      }
      ::-webkit-scrollbar-thumb {
        background: #1F2833;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #45A29E;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .animate-spin-custom {
        animation: spin 1s linear infinite;
      }
    </style>
  </head>
  <body class="h-full flex flex-col font-sans select-none overflow-x-hidden antialiased">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel" data-presets="env,react">
      const { useState, useEffect, useMemo, useRef, useCallback } = React;

      // ─── Gemini AI API Helper ─────────────────────────────────────────────
      function getApiKey() {
        return window.GEMINI_API_KEY || localStorage.getItem('GEMINI_API_KEY') || '';
      }

      function setApiKey(key) {
        localStorage.setItem('GEMINI_API_KEY', key);
      }

      async function callGemini(prompt) {
        const apiKey = getApiKey();
        if (!apiKey) throw new Error('GEMINI_API_KEY not set. Click the key icon in the AI assistant to configure.');
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(`Gemini API error: ${res.status} ${err}`);
        }
        const data = await res.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response.';
      }

      async function aiChat(message, context) {
        const fullPrompt = context
          ? `You are an AI project assistant. Use this project context:\n${context}\n\nUser: ${message}`
          : message;
        return callGemini(fullPrompt);
      }

      async function aiSprintSummary(tasks, members) {
        const taskLines = tasks.map(t => {
          const name = members.find(m => m.id === t.assigneeId)?.name || 'Unassigned';
          return `- [${t.status}] "${t.title}" (${t.priority}, assigned to ${name})`;
        }).join('\n');
        return callGemini(`Summarize this sprint's progress. Highlight blockers and suggest focus areas.\n\n${taskLines}`);
      }

      async function aiTaskSuggestions(projectName, existingTitles) {
        const prompt = `Suggest 5 new task titles for project "${projectName}". Existing: ${existingTitles.join(', ')}. Return ONLY a JSON array of strings.`;
        const text = await callGemini(prompt);
        try { return JSON.parse(text); }
        catch { return text.split('\n').map(l => l.replace(/^[\d.\-* ]+/, '').trim()).filter(Boolean).slice(0, 5); }
      }

      // ─── Seeded Data ──────────────────────────────────────────────────────
      const STORAGE_KEY = 'sprint_engine_state_v2';

      // ─── Firebase / Database Layer ───────────────────────────────────────
      let db = null;
      try {
        if (typeof firebase !== 'undefined') {
          firebase.initializeApp({
            apiKey: "AIzaSyDtOrJhMEQYiuvKIW19q-t3h7iin1C-5eQ",
            authDomain: "workflow-7b279.firebaseapp.com",
            databaseURL: "https://workflow-7b279-default-rtdb.firebaseio.com",
            projectId: "workflow-7b279",
            storageBucket: "workflow-7b279.firebasestorage.app",
            messagingSenderId: "784831169944",
            appId: "1:784831169944:web:aa0cd56c0548fea8e7d7ed"
          });
          db = firebase.database();
        }
      } catch (e) { console.warn('Firebase init failed:', e); db = null; }

      function canUseDB() { return db !== null; }

      let _dbAvailable = null;

      function isDBAvailable() {
        if (!canUseDB()) return Promise.resolve(false);
        if (_dbAvailable !== null) return Promise.resolve(_dbAvailable);
        return new Promise(resolve => {
          const timeout = setTimeout(() => { _dbAvailable = false; resolve(false); }, 2000);
          db.ref('.info/connected').once('value')
            .then(snap => { clearTimeout(timeout); _dbAvailable = snap.val() === true; resolve(_dbAvailable); })
            .catch(() => { clearTimeout(timeout); _dbAvailable = false; resolve(false); });
        });
      }

      function useDbCollection(collectionName, orderByField) {
        const [items, setItems] = useState([]);
        const [ready, setReady] = useState(false);

        useEffect(() => {
          let cancelled = false;
          let listener = null;

          try {
            const cached = localStorage.getItem(STORAGE_KEY);
            if (cached) {
              const parsed = JSON.parse(cached);
              if (parsed[collectionName]) setItems(parsed[collectionName]);
            }
          } catch (e) {}
          setReady(true);

          const tryConnect = async () => {
            const available = await isDBAvailable();
            if (cancelled) return;
            if (available) {
              const ref = db.ref(collectionName);
              listener = ref.on('value', snap => {
                if (cancelled) return;
                const data = snap.val();
                if (!data) { setItems([]); return; }
                const list = Object.entries(data).map(([id, val]) => ({ id, ...val }));
                if (orderByField) {
                  list.sort((a, b) => ((b[orderByField] || '') > (a[orderByField] || '') ? 1 : -1));
                }
                setItems(list);
                try {
                  const cached = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                  cached[collectionName] = list;
                  localStorage.setItem(STORAGE_KEY, JSON.stringify(cached));
                } catch (e) {}
              });
            }
          };
          tryConnect();

          return () => { cancelled = true; if (listener) db.ref(collectionName).off('value', listener); };
        }, [collectionName]);

        return [items, ready, setItems];
      }

      async function dbWriteDoc(collectionName, doc) {
        const { id, ...data } = doc;
        const available = await isDBAvailable();
        if (available) {
          try {
            const ref = db.ref(collectionName).push();
            await ref.set(data);
            return;
          } catch (e) {}
        }
      }

      async function dbUpdateDoc(collectionName, id, data) {
        const available = await isDBAvailable();
        if (available) {
          try {
            const clean = { ...data };
            delete clean.id;
            await db.ref(`${collectionName}/${id}`).update(clean);
            return;
          } catch (e) {}
        }
      }

      async function dbDeleteDoc(collectionName, id) {
        const available = await isDBAvailable();
        if (available) {
          try {
            await db.ref(`${collectionName}/${id}`).remove();
            return;
          } catch (e) {}
        }
      }

      // ─── AI Assistant Component ───────────────────────────────────────────
      function AIAssistant({ tasks, teamMembers, projectMeta }) {
        const [isOpen, setIsOpen] = useState(false);
        const [showKeyInput, setShowKeyInput] = useState(false);
        const [keyInput, setKeyInput] = useState('');
        const [messages, setMessages] = useState([
          { role: 'assistant', text: `Hi! I'm your AI assistant for "${projectMeta.name}". Ask me anything or use a quick action.` }
        ]);
        const [input, setInput] = useState('');
        const [loading, setLoading] = useState(false);
        const endRef = useRef(null);

        useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

        const hasKey = !!getApiKey();

        function buildContext() {
          const counts = {};
          tasks.forEach(t => { counts[t.status] = (counts[t.status] || 0) + 1; });
          return `Project: ${projectMeta.name}\nDescription: ${projectMeta.description}\nTotal Tasks: ${tasks.length}\nTo Do: ${counts['to-do'] || 0}, In Progress: ${counts['in-progress'] || 0}, Done: ${counts.done || 0}, Blocked: ${counts.blocked || 0}\nTeam: ${teamMembers.map(m => `${m.name} (${m.role})`).join(', ')}`;
        }

        async function sendMessage(text) {
          if (!text.trim() || loading) return;
          setMessages(prev => [...prev, { role: 'user', text }]);
          setInput('');
          setLoading(true);
          try {
            if (!hasKey) throw new Error('Please set your Gemini API key first.');
            const response = await aiChat(text, buildContext());
            setMessages(prev => [...prev, { role: 'assistant', text: response }]);
          } catch (err) {
            setMessages(prev => [...prev, { role: 'assistant', text: `Error: ${err.message}` }]);
          }
          setLoading(false);
        }

        async function handleQuickAction(action) {
          setLoading(true);
          setMessages(prev => [...prev, { role: 'user', text: `Run: ${action}` }]);
          try {
            if (!hasKey) throw new Error('Please set your Gemini API key first.');
            let response;
            if (action === 'summary') {
              response = await aiSprintSummary(tasks, teamMembers);
            } else if (action === 'suggest') {
              const suggestions = await aiTaskSuggestions(projectMeta.name, tasks.map(t => t.title));
              response = `Here are some suggested tasks:\n\n${suggestions.map((s, i) => `${i + 1}. ${s}`).join('\n')}`;
            }
            setMessages(prev => [...prev, { role: 'assistant', text: response }]);
          } catch (err) {
            setMessages(prev => [...prev, { role: 'assistant', text: `Error: ${err.message}` }]);
          }
          setLoading(false);
        }

        function handleSaveKey(e) {
          e.preventDefault();
          if (keyInput.trim()) {
            setApiKey(keyInput.trim());
            setShowKeyInput(false);
            setKeyInput('');
          }
        }

        return (
          <>
            {/* Floating action button */}
            <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">
              {isOpen && (
                <div className="w-[360px] h-[520px] bg-[#1F2833] border border-brand-muted/30 rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                  {/* Header */}
                  <div className="flex items-center justify-between px-4 py-3 border-b border-brand-muted/15 shrink-0">
                    <div className="flex items-center gap-2.5">
                      <span className="material-symbols-outlined text-brand-accent">auto_awesome</span>
                      <div>
                        <span className="text-sm font-bold text-brand-heading">AI Assistant</span>
                        <span className="text-[9px] text-brand-muted block font-mono">Gemini 2.0 Flash</span>
                      </div>
                    </div>
                    <div className="flex items-center gap-1">
                      <button onClick={() => setShowKeyInput(!showKeyInput)} className="p-1.5 text-brand-muted hover:text-brand-accent rounded-lg transition-colors cursor-pointer" title="Set API Key">
                        <span className="material-symbols-outlined text-sm">key</span>
                      </button>
                      <button onClick={() => setIsOpen(false)} className="p-1.5 text-brand-muted hover:text-brand-accent rounded-lg transition-colors cursor-pointer">
                        <span className="material-symbols-outlined text-sm">close</span>
                      </button>
                    </div>
                  </div>

                  {/* API Key input */}
                  {showKeyInput && (
                    <form onSubmit={handleSaveKey} className="px-4 py-2.5 bg-brand-bg border-b border-brand-muted/10 flex gap-2 shrink-0">
                      <input type="password" placeholder="Enter your Gemini API key..." value={keyInput} onChange={e => setKeyInput(e.target.value)} className="flex-1 bg-[#1F2833] border border-brand-muted/20 rounded-lg px-2.5 py-1.5 text-xs text-brand-heading outline-none placeholder-brand-muted/50" />
                      <button type="submit" className="px-2.5 py-1.5 bg-brand-accent text-brand-bg text-[10px] font-bold uppercase rounded-lg tracking-wider">Save</button>
                    </form>
                  )}

                  {!hasKey && !showKeyInput && (
                    <div className="px-4 py-3 bg-amber-950/30 border-b border-amber-500/20 text-[10px] text-amber-400 font-mono shrink-0">
                      ⚠ Gemini API key not configured. Click the key icon above to set one.
                    </div>
                  )}

                  {/* Messages */}
                  <div className="flex-1 overflow-y-auto px-4 py-3 space-y-3">
                    {messages.map((msg, i) => (
                      <div key={i} className={`flex gap-2.5 ${msg.role === 'user' ? 'justify-end' : ''}`}>
                        {msg.role === 'assistant' && (
                          <span className="material-symbols-outlined text-brand-accent text-base mt-1">auto_awesome</span>
                        )}
                        <div className={`max-w-[80%] rounded-2xl px-3.5 py-2 text-xs leading-relaxed ${
                          msg.role === 'user' ? 'bg-brand-accent text-brand-bg rounded-br-md font-medium' : 'bg-brand-bg text-brand-text rounded-bl-md border border-brand-muted/10'
                        }`}>
                          {msg.text.split('\n').map((line, j) => (
                            <span key={j}>{line}{j < msg.text.split('\n').length - 1 && <br/>}</span>
                          ))}
                        </div>
                        {msg.role === 'user' && (
                          <span className="material-symbols-outlined text-brand-text text-base mt-1">person</span>
                        )}
                      </div>
                    ))}
                    {loading && (
                      <div className="flex gap-2.5">
                        <span className="material-symbols-outlined text-brand-accent text-base">auto_awesome</span>
                        <div className="bg-brand-bg rounded-2xl rounded-bl-md px-3.5 py-2 border border-brand-muted/10">
                          <span className="material-symbols-outlined text-sm text-brand-accent animate-spin-custom">sync</span>
                        </div>
                      </div>
                    )}
                    <div ref={endRef} />
                  </div>

                  {/* Quick actions */}
                  <div className="px-4 py-2 border-t border-brand-muted/10 flex gap-2 shrink-0">
                    <button onClick={() => handleQuickAction('summary')} disabled={loading} className="flex items-center gap-1 px-2.5 py-1 bg-brand-bg hover:bg-brand-muted/10 text-brand-muted hover:text-brand-accent rounded-lg text-[9px] font-bold uppercase tracking-wider transition-colors cursor-pointer disabled:opacity-50">
                      <span className="material-symbols-outlined text-xs">summarize</span> Sprint Summary
                    </button>
                    <button onClick={() => handleQuickAction('suggest')} disabled={loading} className="flex items-center gap-1 px-2.5 py-1 bg-brand-bg hover:bg-brand-muted/10 text-brand-muted hover:text-brand-accent rounded-lg text-[9px] font-bold uppercase tracking-wider transition-colors cursor-pointer disabled:opacity-50">
                      <span className="material-symbols-outlined text-xs">lightbulb</span> Suggest Tasks
                    </button>
                  </div>

                  {/* Input */}
                  <form onSubmit={e => { e.preventDefault(); sendMessage(input); }} className="px-4 py-3 border-t border-brand-muted/10 flex gap-2 shrink-0 bg-brand-bg/50">
                    <input type="text" value={input} onChange={e => setInput(e.target.value)} placeholder="Ask about your project..." disabled={loading} className="flex-1 bg-[#1F2833] border border-brand-muted/20 rounded-xl px-3 py-2 text-xs text-brand-heading outline-none placeholder-brand-muted/50 disabled:opacity-50" />
                    <button type="submit" disabled={loading || !input.trim()} className="px-3 py-2 bg-brand-accent text-brand-bg rounded-xl text-[10px] font-bold uppercase tracking-wider disabled:opacity-50 cursor-pointer">
                      <span className="material-symbols-outlined text-sm">send</span>
                    </button>
                  </form>
                </div>
              )}

              <button onClick={() => setIsOpen(!isOpen)} className={`w-14 h-14 rounded-2xl shadow-xl flex items-center justify-center transition-all duration-300 cursor-pointer hover:scale-105 active:scale-95 ${
                isOpen ? 'bg-red-500/80 hover:bg-red-500' : 'bg-gradient-to-br from-cyan-500 to-teal-600 hover:from-cyan-400 hover:to-teal-500'
              }`}>
                <span className="material-symbols-outlined text-white text-2xl">{isOpen ? 'close' : 'auto_awesome'}</span>
              </button>
            </div>
          </>
        );
      }

      // ─── Main App ─────────────────────────────────────────────────────────
      function App() {
        const [tasks, tasksReady, setTasks] = useDbCollection('tasks', 'createdAt');
        const [teamMembers, membersReady, setTeamMembers] = useDbCollection('teamMembers');
        const [activities, activitiesReady, setActivities] = useDbCollection('activities', 'timestamp');
        const [projectMeta, setProjectMeta] = useState({
          name: 'Sprint Analytics Engine',
          description: 'Aesthetic metrics visualization panel & task orchestration monitor',
          managerId: ''
        });
        const ready = tasksReady && membersReady && activitiesReady;

        const [activeTab, setActiveTab] = useState('dashboard');

        useEffect(() => {
          try {
            const cached = localStorage.getItem(STORAGE_KEY);
            if (cached) {
              const parsed = JSON.parse(cached);
              if (parsed.projectMeta) setProjectMeta(parsed.projectMeta);
            }
          } catch (e) {}
          // Try RTDB for project meta
          isDBAvailable().then(available => {
            if (available) {
              db.ref('settings/project').once('value').then(snap => {
                if (snap.exists()) setProjectMeta(snap.val());
              }).catch(() => {});
            }
          });
        }, []);

        useEffect(() => {
          if (!ready) return;
          const data = { tasks, teamMembers, activities, projectMeta };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }, [tasks, teamMembers, activities, projectMeta, ready]);

        const handleAddTask = async (newTask) => {
          const fresh = { ...newTask, id: `task-${Date.now()}`, createdAt: new Date().toISOString() };
          const user = teamMembers.find(m => m.id === fresh.assigneeId) || { name: 'Unassigned' };
          const dbAvailable = await isDBAvailable();
          if (dbAvailable) {
            await dbWriteDoc('tasks', fresh);
          } else {
            setTasks(prev => [fresh, ...prev]);
          }
          logActivity(`Task "${fresh.title}" created. Assigned to ${user.name}.`, 'create');
        };

        const handleUpdateTask = async (updated) => {
          const original = tasks.find(t => t.id === updated.id);
          const dbAvailable = await isDBAvailable();
          if (dbAvailable) {
            await dbUpdateDoc('tasks', updated.id, updated);
          } else {
            setTasks(prev => prev.map(t => t.id === updated.id ? updated : t));
          }
          if (original && original.status !== updated.status) logActivity(`Task "${updated.title}" moved to ${updated.status.toUpperCase()}`, 'move');
          else logActivity(`Task "${updated.title}" updated`, 'system');
        };

        const handleDeleteTask = async (id) => {
          const original = tasks.find(t => t.id === id);
          const dbAvailable = await isDBAvailable();
          if (dbAvailable) {
            await dbDeleteDoc('tasks', id);
          } else {
            setTasks(prev => prev.filter(t => t.id !== id));
          }
          if (original) logActivity(`Task "${original.title}" deleted from project backlog.`, 'system');
        };

        const handleAddTeamMember = async (member) => {
          const fresh = { ...member, id: `member-${Date.now()}` };
          const dbAvailable = await isDBAvailable();
          if (dbAvailable) {
            await dbWriteDoc('teamMembers', fresh);
          } else {
            setTeamMembers(prev => [...prev, fresh]);
          }
          logActivity(`New member "${fresh.name}" onboarded.`, 'create');
        };

        const handleUpdateTeamMember = async (id, data) => {
          const dbAvailable = await isDBAvailable();
          if (dbAvailable) {
            await dbUpdateDoc('teamMembers', id, data);
          } else {
            setTeamMembers(prev => prev.map(m => m.id === id ? { ...m, ...data } : m));
          }
        };

        const handleSaveProjectMeta = async (meta) => {
          setProjectMeta(meta);
          const available = await isDBAvailable();
          if (available) {
            try { await db.ref('settings/project').set(meta); } catch (e) {}
          }
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, teamMembers, activities, projectMeta: meta }));
        };

        const logActivity = async (text, type = 'system') => {
          const entry = { id: `act-${Date.now()}`, text, timestamp: new Date().toISOString(), type };
          const dbAvailable = await isDBAvailable();
          if (dbAvailable) {
            await dbWriteDoc('activities', entry);
          } else {
            setActivities(prev => [entry, ...prev.slice(0, 30)]);
          }
        };

        const activeManager = teamMembers.find(m => m.id === projectMeta.managerId) || teamMembers[0] || null;

        return (
          <div className="min-h-screen bg-brand-bg text-brand-text font-sans flex flex-col">
            
            <header className="bg-brand-card border-b border-brand-muted/20 px-4 py-2.5 flex items-center justify-between gap-4 z-40 shadow-md shrink-0">
              <div className="flex items-center gap-3">
                <span className="p-2.5 bg-brand-bg border border-brand-muted/20 rounded-xl text-brand-accent flex items-center justify-center">
                  <span className="material-symbols-outlined text-lg">database</span>
                </span>
                <div className="flex flex-col">
                  <h1 className="text-sm font-extrabold tracking-wide text-brand-heading">{projectMeta.name}</h1>
                  <span className="text-[10px] font-mono text-brand-accent tracking-widest font-semibold flex items-center gap-1">
                    <span className="inline-block w-1.5 h-1.5 rounded-full bg-brand-accent animate-pulse"></span>
                    NODE STATUS: OPTIMIZED ACTIVE CLIENT
                  </span>
                </div>
              </div>

            </header>

            <main className="flex-1 w-full flex overflow-hidden">
              
                <div className="w-full flex flex-col md:flex-row gap-0">
                  
                  <aside className="hidden md:flex md:w-52 shrink-0 flex-col bg-brand-card border-r border-brand-muted/15">
                    <div className="px-4 py-3 border-b border-brand-muted/15">
                      <div className="flex items-center gap-2 text-brand-accent font-black tracking-widest">
                        <span className="material-symbols-outlined text-lg">api</span> NOVA.OS
                      </div>
                      <p className="text-[9px] text-brand-muted mt-0.5 uppercase font-semibold">Project Overseer</p>
                    </div>

                    <nav className="flex flex-col gap-0.5 p-2 flex-1">
                      {[
                        { id: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
                        { id: 'board', label: 'Kanban Board', icon: 'view_week' },
                        { id: 'calendar', label: 'Sprint Calendar', icon: 'calendar_month' },
                        { id: 'team', label: 'Project Team', icon: 'group' },
                        { id: 'settings', label: 'Configuration', icon: 'settings' }
                      ].map(nav => (
                        <button key={nav.id} onClick={() => setActiveTab(nav.id)} className={`flex items-center gap-2.5 px-3 py-2 rounded-lg text-[11px] font-bold uppercase tracking-wider transition-all w-full cursor-pointer ${activeTab === nav.id ? 'bg-brand-accent/15 text-brand-accent' : 'text-brand-text/70 hover:text-brand-text hover:bg-brand-muted/10'}`}>
                          <span className="material-symbols-outlined text-[15px]">{nav.icon}</span>
                          <span>{nav.label}</span>
                        </button>
                      ))}
                    </nav>

                    {activeManager && (
                      <div className="mt-auto px-3 py-2 border-t border-brand-muted/10">
                        <div className="flex items-center gap-2.5 bg-brand-bg/50 px-2.5 py-2 rounded-lg border border-brand-muted/10">
                          <img src={activeManager.avatar} alt="lead" className="w-7 h-7 rounded-full object-cover border border-brand-accent/50" />
                          <div className="flex flex-col overflow-hidden min-w-0">
                            <span className="text-[10px] font-bold text-brand-heading truncate">{activeManager.name}</span>
                            <span className="text-[8px] text-brand-muted truncate font-medium">{activeManager.role}</span>
                          </div>
                        </div>
                      </div>
                    )}
                  </aside>

                  <div className="flex-1 flex flex-col bg-brand-bg overflow-hidden">
                    <div className="flex items-center justify-between px-5 py-2.5 border-b border-brand-muted/10 shrink-0">
                      <div>
                        <h2 className="text-sm font-black text-brand-heading tracking-tight uppercase font-mono">{activeTab} Workspace</h2>
                        <p className="text-[9px] text-brand-muted uppercase tracking-widest font-semibold mt-0.5">{projectMeta.description}</p>
                      </div>
                      <div className="text-right">
                        <span className="text-[9px] text-brand-muted font-bold block">Node</span>
                        <span className="text-[10px] text-brand-accent tracking-wide font-mono font-bold">1024-ALPHA</span>
                      </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 md:p-5">
                      {renderActiveTab({
                        tasks, teamMembers, activities, activeManager, projectMeta, activeTab,
                        setProjectMeta: handleSaveProjectMeta, setTeamMembers: handleUpdateTeamMember,
                        onAddTask: handleAddTask, onUpdateTask: handleUpdateTask, onDeleteTask: handleDeleteTask,
                        onAddTeamMember: handleAddTeamMember, logActivity, setActiveTab
                      })}
                    </div>
                  </div>

                </div>

            </main>

            {/* AI Assistant - rendered in all modes */}
            <AIAssistant tasks={tasks} teamMembers={teamMembers} projectMeta={projectMeta} />

          </div>
        );
      }

      function renderActiveTab(props) {
        switch (props.activeTab) {
          case 'dashboard': return <DashboardView {...props} />;
          case 'board': return <BoardView {...props} />;
          case 'calendar': return <CalendarView {...props} />;
          case 'team': return <TeamView {...props} />;
          case 'settings': return <SettingsView {...props} />;
          default: return <DashboardView {...props} />;
        }
      }

      // ══════════════════════════════════════════════════════════════════════
      //  DASHBOARD VIEW
      // ══════════════════════════════════════════════════════════════════════
      function DashboardView({ tasks, teamMembers, activities, onAddTask, logActivity, setActiveTab }) {
        const [quickText, setQuickText] = useState('');

        const total = tasks.length;
        const inProgress = tasks.filter(t => t.status === 'in-progress').length;
        const toDo = tasks.filter(t => t.status === 'to-do').length;
        const done = tasks.filter(t => t.status === 'done').length;
        const blocked = tasks.filter(t => t.status === 'blocked').length;
        const completed = total - inProgress;

        const donutSlices = useMemo(() => {
          let accumulated = 0;
          const circumference = 2 * Math.PI * 50;
          return [
            { label: 'To Do', value: toDo, color: '#3B82F6' },
            { label: 'In Progress', value: inProgress, color: '#FA9C2E' },
            { label: 'Done', value: done, color: '#10B981' },
            { label: 'Blocked', value: blocked, color: '#EF4444' }
          ].map(slice => {
            const rawPercent = total > 0 ? (slice.value / total) * 100 : 0;
            const length = (rawPercent / 100) * circumference;
            const offset = circumference - ((accumulated / 100) * circumference);
            accumulated += rawPercent;
            return { ...slice, percent: Math.round(rawPercent), dashArray: `${length} ${circumference}`, dashOffset: offset };
          });
        }, [tasks, total]);

        const handlePostComment = (e) => {
          e.preventDefault();
          if (!quickText.trim()) return;
          logActivity(`Manager commentary: "${quickText.trim()}"`, 'comment');
          setQuickText('');
        };

        return (
          <div className="space-y-6 flex flex-col justify-between h-full">
            <div className="grid grid-cols-3 gap-3">
              <div onClick={() => setActiveTab('board')} className="bg-[#1F2833] border border-blue-500/20 hover:border-blue-500/40 cursor-pointer p-3.5 rounded-2xl flex flex-col justify-between h-24 transition-all group">
                <div className="flex justify-between items-center text-blue-400">
                  <span className="text-[10px] font-bold uppercase tracking-wider">Total Backlog</span>
                  <span className="material-symbols-outlined text-base">ballot</span>
                </div>
                <span className="text-2xl font-extrabold text-brand-heading tracking-tight leading-none">{total}</span>
              </div>
              <div onClick={() => setActiveTab('board')} className="bg-[#1F2833] border border-amber-500/20 hover:border-amber-500/40 cursor-pointer p-3.5 rounded-2xl flex flex-col justify-between h-24 transition-all group">
                <div className="flex justify-between items-center text-amber-400">
                  <span className="text-[10px] font-bold uppercase tracking-wider">Active Run</span>
                  <span className="material-symbols-outlined text-base">progress_activity</span>
                </div>
                <span className="text-2xl font-extrabold text-brand-heading tracking-tight leading-none">{inProgress}</span>
              </div>
              <div onClick={() => setActiveTab('board')} className="bg-[#1F2833] border border-emerald-500/20 hover:border-emerald-500/40 cursor-pointer p-3.5 rounded-2xl flex flex-col justify-between h-24 transition-all group">
                <div className="flex justify-between items-center text-emerald-400">
                  <span className="text-[10px] font-bold uppercase tracking-wider">Total Comp.</span>
                  <span className="material-symbols-outlined text-base">check_circle</span>
                </div>
                <span className="text-2xl font-extrabold text-brand-heading tracking-tight leading-none">{completed}</span>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-[#1F2833] border border-brand-muted/15 rounded-2xl p-4 flex flex-col items-center">
                <h3 className="text-[11px] uppercase tracking-wider font-extrabold text-brand-accent mb-3 w-full text-left">Task Distributions</h3>
                <div className="relative w-36 h-36 flex items-center justify-center">
                  <svg className="w-full h-full transform -rotate-90" viewBox="0 0 120 120">
                    {total === 0 ? (
                      <circle cx="60" cy="60" r="50" fill="transparent" stroke="#2D3748" strokeWidth="12" />
                    ) : (
                      donutSlices.map((slice, idx) => (
                        <circle key={idx} cx="60" cy="60" r="50" fill="transparent" stroke={slice.color} strokeWidth="12" strokeDasharray={slice.dashArray} strokeDashoffset={slice.dashOffset} className="transition-all duration-500 hover:stroke-[16] cursor-pointer" />
                      ))
                    )}
                  </svg>
                  <div className="absolute text-center">
                    <span className="text-xl font-black text-brand-heading font-mono">{total}</span>
                    <span className="text-[8px] text-brand-muted block uppercase tracking-wide">Tasks</span>
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-2 w-full mt-4 text-[10px]">
                  {donutSlices.map((slice, idx) => (
                    <div key={idx} className="flex items-center gap-1.5 px-1">
                      <span className="w-2 h-2 rounded-full inline-block shrink-0" style={{ backgroundColor: slice.color }}></span>
                      <span className="text-brand-text truncate uppercase font-bold">{slice.label}</span>
                      <span className="ml-auto font-mono text-brand-heading">{slice.percent}%</span>
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-[#1F2833] border border-brand-muted/15 rounded-2xl p-4 flex flex-col justify-between">
                <div>
                  <h3 className="text-[11px] uppercase tracking-wider font-extrabold text-brand-accent mb-2">Publish Sprint Commentary</h3>
                  <p className="text-[10px] text-brand-muted mb-3 leading-relaxed">Broadcast project status summaries, roadblocks, or celebratory announcements instantly into the team activities log database.</p>
                </div>
                <form onSubmit={handlePostComment} className="space-y-3">
                  <textarea rows="2" placeholder="Describe latest sprint status updates..." value={quickText} onChange={(e) => setQuickText(e.target.value)} className="w-full text-xs p-2.5 bg-brand-bg border border-brand-muted/20 rounded-xl placeholder-brand-muted/60 text-brand-heading outline-none focus:border-brand-accent resize-none font-sans" />
                  <button type="submit" className="w-full py-2 bg-brand-accent hover:opacity-90 text-brand-bg font-extrabold text-[10px] uppercase tracking-wider rounded-xl transition-all cursor-pointer">Publish to System Logs</button>
                </form>
              </div>
            </div>

            <div className="bg-[#1F2833] border border-brand-muted/15 rounded-2xl p-4">
              <h3 className="text-[11px] uppercase tracking-wider font-extrabold text-brand-accent mb-3">Live System Event Logs</h3>
              <div className="space-y-2 max-h-40 overflow-y-auto pr-1">
                {activities.slice(0, 5).map((act, i) => (
                  <div key={i} className="text-[11px] p-2 bg-brand-bg border border-brand-muted/5 rounded-xl flex items-start gap-2.5">
                    <span className="material-symbols-outlined text-[12px] text-brand-accent mt-0.5">
                      {act.type === 'move' ? 'double_arrow' : act.type === 'complete' ? 'check_circle' : act.type === 'comment' ? 'comment' : 'info'}
                    </span>
                    <div className="flex-1 min-w-0">
                      <p className="text-brand-heading leading-snug truncate">{act.text}</p>
                      <span className="text-[8px] font-mono text-brand-muted">{new Date(act.timestamp).toLocaleTimeString()}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      // ══════════════════════════════════════════════════════════════════════
      //  BOARD VIEW
      // ══════════════════════════════════════════════════════════════════════
      function BoardView({ tasks, teamMembers, onAddTask, onUpdateTask, onDeleteTask }) {
        const [search, setSearch] = useState('');
        const [prioFilter, setPrioFilter] = useState('all');
        const [assigneeFilter, setAssigneeFilter] = useState('all');
        const [isAddOpen, setIsAddOpen] = useState(false);
        const [isEditOpen, setIsEditOpen] = useState(false);
        const [activeTask, setActiveTask] = useState(null);
        const [tTitle, setTTitle] = useState('');
        const [tDesc, setTDesc] = useState('');
        const [tPriority, setTPriority] = useState('medium');
        const [tStatus, setTStatus] = useState('to-do');
        const [tAssignee, setTAssignee] = useState(teamMembers[0]?.id || '');
        const [tDueDate, setTDueDate] = useState(new Date().toISOString().split('T')[0]);

        const filtered = useMemo(() => {
          return tasks.filter(t => {
            const matchesSearch = t.title.toLowerCase().includes(search.toLowerCase()) || t.description.toLowerCase().includes(search.toLowerCase());
            const matchesPrio = prioFilter === 'all' || t.priority === prioFilter;
            const matchesUser = assigneeFilter === 'all' || t.assigneeId === assigneeFilter;
            return matchesSearch && matchesPrio && matchesUser;
          });
        }, [tasks, search, prioFilter, assigneeFilter]);

        const openAdd = (status) => {
          setTStatus(status); setTTitle(''); setTDesc(''); setTPriority('medium'); setTAssignee(teamMembers[0]?.id || ''); setTDueDate(new Date().toISOString().split('T')[0]); setIsAddOpen(true);
        };

        const openEdit = (task) => {
          setActiveTask(task); setTTitle(task.title); setTDesc(task.description); setTPriority(task.priority); setTStatus(task.status); setTAssignee(task.assigneeId); setTDueDate(task.dueDate); setIsEditOpen(true);
        };

        const columns = [
          { id: 'to-do', label: 'To Do', color: 'border-blue-400' },
          { id: 'in-progress', label: 'In Progress', color: 'border-amber-400' },
          { id: 'done', label: 'Done', color: 'border-emerald-400' },
          { id: 'blocked', label: 'Blocked', color: 'border-red-400' }
        ];

        return (
          <div className="space-y-4">
            <div className="bg-[#1F2833] p-3 rounded-2xl border border-brand-muted/10 gap-3 flex flex-wrap items-center justify-between">
              <div className="relative flex-1 min-w-[160px]">
                <span className="material-symbols-outlined absolute left-2.5 top-1/2 transform -translate-y-1/2 text-brand-muted text-sm">search</span>
                <input type="text" placeholder="Filter tasks..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full bg-brand-bg pl-8 pr-3 py-1.5 rounded-xl text-xs text-brand-heading border border-brand-muted/20 outline-none placeholder-brand-muted/50" />
              </div>
              <div className="flex items-center gap-2">
                <select value={prioFilter} onChange={(e) => setPrioFilter(e.target.value)} className="bg-brand-bg text-[10px] uppercase tracking-wider font-bold text-brand-heading border border-brand-muted/20 rounded-xl px-2 py-1.5 outline-none">
                  <option value="all">Priority: All</option>
                  <option value="high">High</option>
                  <option value="medium">Medium</option>
                  <option value="low">Low</option>
                </select>
                <select value={assigneeFilter} onChange={(e) => setAssigneeFilter(e.target.value)} className="bg-brand-bg text-[10px] uppercase tracking-wider font-bold text-brand-heading border border-brand-muted/20 rounded-xl px-2 py-1.5 outline-none">
                  <option value="all">Assignee: All</option>
                  {teamMembers.map(m => <option key={m.id} value={m.id}>{m.name.split(' ')[0]} — {m.email}</option>)}
                </select>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
              {columns.map(col => {
                const colTasks = filtered.filter(t => t.status === col.id);
                return (
                  <div key={col.id} className="bg-[#1F2833]/60 p-3 rounded-xl border border-brand-muted/10 flex flex-col min-h-[300px]">
                    <div className={`border-l-4 ${col.color} pl-2 py-0.5 flex justify-between items-center mb-3 shrink-0`}>
                      <span className="text-[11px] font-black uppercase text-brand-heading tracking-wide font-mono">{col.label}</span>
                      <span className="text-[9px] font-mono text-brand-accent bg-[#0B0C10] px-1.5 py-0.5 rounded-md font-bold">{colTasks.length}</span>
                    </div>
                    <button onClick={() => openAdd(col.id)} className="w-full py-1.5 border border-dashed border-brand-muted/20 hover:border-brand-accent/40 rounded-xl text-center text-[10px] flex items-center justify-center gap-1 text-brand-muted hover:text-brand-accent transition-all cursor-pointer mb-2.5">
                      <span className="material-symbols-outlined text-xs">add</span> ADD SPEC
                    </button>
                    <div className="space-y-2.5 flex-1 overflow-y-auto max-h-[360px]">
                      {colTasks.map(task => {
                        const user = teamMembers.find(m => m.id === task.assigneeId) || teamMembers[0];
                        return (
                          <div key={task.id} className="bg-brand-card border border-brand-muted/10 rounded-xl p-3 space-y-2.5 shadow-sm hover:border-brand-accent/30 transition-all">
                            <div className="flex justify-between items-start gap-1">
                              <span className={`text-[8px] px-1.5 py-0.5 font-bold uppercase rounded-md ${task.priority === 'high' ? 'bg-red-950 text-red-400' : task.priority === 'medium' ? 'bg-yellow-950 text-yellow-500' : 'bg-blue-950 text-blue-400'}`}>{task.priority}</span>
                              <div className="flex items-center gap-1 shrink-0">
                                <button onClick={() => openEdit(task)} className="text-brand-muted hover:text-brand-accent cursor-pointer"><span className="material-symbols-outlined text-[12px]">edit</span></button>
                                <button onClick={() => onDeleteTask(task.id)} className="text-brand-muted hover:text-red-400 cursor-pointer"><span className="material-symbols-outlined text-[12px]">delete</span></button>
                              </div>
                            </div>
                            <h4 className="text-[11px] font-bold text-brand-heading tracking-tight leading-snug line-clamp-2">{task.title}</h4>
                            <div className="pt-2 border-t border-brand-muted/5 flex items-center justify-between">
                              <div className="flex items-center gap-1 text-brand-accent min-w-0">
                                <img src={user.avatar} className="w-5 h-5 rounded-full object-cover border border-brand-muted/40 shrink-0" />
                                <div className="flex flex-col min-w-0">
                                  <span className="text-[9px] text-brand-text font-medium truncate max-w-[60px]">{user.name.split(' ')[0]}</span>
                                  <a href={`mailto:${user.email}`} className="text-[7px] text-brand-muted truncate hover:text-brand-accent transition-colors">{user.email}</a>
                                </div>
                              </div>
                              <span className="text-[8px] font-mono text-brand-muted flex items-center gap-0.5 shrink-0">
                                <span className="material-symbols-outlined text-[9px]">calendar_today</span>
                                {task.dueDate.split('-')[1]}/{task.dueDate.split('-')[2]}
                              </span>
                            </div>
                            <div className="flex gap-1 pt-1.5">
                              {columns.filter(c => c.id !== task.status).map(c => (
                                <button key={c.id} onClick={() => onUpdateTask({ ...task, status: c.id })} className="flex-1 py-0.5 bg-brand-bg rounded-[4px] border border-brand-muted/5 text-[7px] text-brand-muted uppercase tracking-wide hover:text-brand-accent hover:border-brand-accent/20 transition-all font-mono cursor-pointer">{c.label.split(' ')[0]}</button>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Create Modal */}
            {isAddOpen && (
              <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4">
                <div className="bg-[#1F2833] max-w-sm w-full p-5 rounded-2xl border border-brand-accent/20 space-y-4">
                  <div className="flex justify-between items-center pb-2 border-b border-brand-muted/20">
                    <h3 className="text-sm font-bold text-brand-accent uppercase tracking-wider flex items-center gap-1.5"><span className="material-symbols-outlined text-base">add_box</span> Create Backlog Spec</h3>
                    <button onClick={() => setIsAddOpen(false)} className="text-brand-muted hover:text-brand-accent cursor-pointer"><span className="material-symbols-outlined text-lg">close</span></button>
                  </div>
                  <form onSubmit={e => { e.preventDefault(); if (!tTitle.trim()) return; onAddTask({ title: tTitle.trim(), description: tDesc.trim() || 'No description.', priority: tPriority, status: tStatus, assigneeId: tAssignee, dueDate: tDueDate }); setIsAddOpen(false); }} className="space-y-3">
                    <div className="flex flex-col gap-1">
                      <label className="text-[8px] font-bold text-brand-muted uppercase">Task Name *</label>
                      <input type="text" required placeholder="e.g. Audit server credentials" value={tTitle} onChange={e => setTTitle(e.target.value)} className="bg-brand-bg p-2 text-xs rounded-xl border border-brand-muted/20 text-brand-heading outline-none w-full" />
                    </div>
                    <div className="flex flex-col gap-1">
                      <label className="text-[8px] font-bold text-brand-muted uppercase">Description</label>
                      <textarea rows="2" placeholder="Describe deployment dependencies..." value={tDesc} onChange={e => setTDesc(e.target.value)} className="bg-brand-bg p-2 text-xs rounded-xl border border-brand-muted/20 text-brand-heading resize-none outline-none w-full" />
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div className="flex flex-col gap-1">
                        <label className="text-[8px] font-bold text-brand-muted uppercase">Assignee</label>
                        <select value={tAssignee} onChange={e => setTAssignee(e.target.value)} className="bg-brand-bg p-1.5 text-xs rounded-xl border border-brand-muted/20 text-brand-heading outline-none">{teamMembers.length === 0 ? <option value="">Unassigned</option> : teamMembers.map(m => <option key={m.id} value={m.id}>{m.name} — {m.email}</option>)}</select>
                      </div>
                      <div className="flex flex-col gap-1">
                        <label className="text-[8px] font-bold text-brand-muted uppercase">Due Date</label>
                        <input type="date" value={tDueDate} onChange={e => setTDueDate(e.target.value)} className="bg-brand-bg p-1.5 text-xs rounded-xl border border-brand-muted/20 text-brand-heading outline-none w-full" />
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div className="flex flex-col gap-1">
                        <label className="text-[8px] font-bold text-brand-muted uppercase">Priority</label>
                        <select value={tPriority} onChange={e => setTPriority(e.target.value)} className="bg-brand-bg p-1.5 text-xs rounded-xl border border-brand-muted/20 text-brand-heading outline-none">
                          <option value="low">Low</option>
                          <option value="medium">Medium</option>
                          <option value="high">High</option>
                        </select>
                      </div>
                      <div className="flex flex-col gap-1">
                        <label className="text-[8px] font-bold text-brand-muted uppercase">Stage</label>
                        <select value={tStatus} onChange={e => setTStatus(e.target.value)} className="bg-brand-bg p-1.5 text-xs rounded-xl border border-brand-muted/20 text-brand-heading outline-none">
                          <option value="to-do">To Do</option>
                          <option value="in-progress">In Progress</option>
                          <option value="done">Done</option>
                          <option value="blocked">Blocked</option>
                        </select>
                      </div>
                    </div>
                    <button type="submit" className="w-full py-2.5 bg-brand-accent text-brand-bg uppercase font-black text-xs rounded-xl tracking-wider hover:opacity-90 cursor-pointer">Commit Task Spec</button>
                  </form>
                </div>
              </div>
            )}

            {/* Edit Modal */}
            {isEditOpen && (
              <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4">
                <div className="bg-[#1F2833] max-w-sm w-full p-5 rounded-2xl border border-brand-accent/20 space-y-4">
                  <div className="flex justify-between items-center pb-2 border-b border-brand-muted/20">
                    <h3 className="text-sm font-bold text-brand-accent uppercase tracking-wider flex items-center gap-1.5"><span className="material-symbols-outlined text-base">border_color</span> Edit Task</h3>
                    <button onClick={() => setIsEditOpen(false)} className="text-brand-muted hover:text-brand-accent cursor-pointer"><span className="material-symbols-outlined text-lg">close</span></button>
                  </div>
                  <form onSubmit={e => { e.preventDefault(); if (!tTitle.trim()) return; onUpdateTask({ ...activeTask, title: tTitle.trim(), description: tDesc.trim(), priority: tPriority, status: tStatus, assigneeId: tAssignee, dueDate: tDueDate }); setIsEditOpen(false); }} className="space-y-3">
                    <div className="flex flex-col gap-1">
                      <label className="text-[8px] font-bold text-brand-muted uppercase">Task Name *</label>
                      <input type="text" required value={tTitle} onChange={e => setTTitle(e.target.value)} className="bg-brand-bg p-2 text-xs rounded-xl border border-brand-muted/20 text-brand-heading outline-none w-full" />
                    </div>
                    <div className="flex flex-col gap-1">
                      <label className="text-[8px] font-bold text-brand-muted uppercase">Description</label>
                      <textarea rows="2" value={tDesc} onChange={e => setTDesc(e.target.value)} className="bg-brand-bg p-2 text-xs rounded-xl border border-brand-muted/20 text-brand-heading resize-none outline-none w-full" />
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div className="flex flex-col gap-1">
                        <label className="text-[8px] font-bold text-brand-muted uppercase">Assignee</label>
                        <select value={tAssignee} onChange={e => setTAssignee(e.target.value)} className="bg-brand-bg p-1.5 text-xs rounded-xl border border-brand-muted/20 text-brand-heading outline-none">{teamMembers.length === 0 ? <option value="">Unassigned</option> : teamMembers.map(m => <option key={m.id} value={m.id}>{m.name} — {m.email}</option>)}</select>
                      </div>
                      <div className="flex flex-col gap-1">
                        <label className="text-[8px] font-bold text-brand-muted uppercase">Due Date</label>
                        <input type="date" value={tDueDate} onChange={e => setTDueDate(e.target.value)} className="bg-brand-bg p-1.5 text-xs rounded-xl border border-brand-muted/20 text-brand-heading outline-none w-full" />
                      </div>

                    <div className="grid grid-cols-2 gap-2">
                      <div className="flex flex-col gap-1">
                        <label className="text-[8px] font-bold text-brand-muted uppercase">Priority</label>

      // ══════════════════════════════════════════════════════════════════════
      //  CALENDAR VIEW
      // ══════════════════════════════════════════════════════════════════════
      function CalendarView({ tasks, teamMembers, onAddTask }) {
        const [current, setCurrent] = useState(new Date());
        const [selectedStr, setSelectedStr] = useState(new Date().toISOString().split('T')[0]);
        const [showAdd, setShowAdd] = useState(false);
        const [qTitle, setQTitle] = useState('');
        const [qAssignee, setQAssignee] = useState(teamMembers[0]?.id || '');

        const year = current.getFullYear();
        const month = current.getMonth();
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const weekdayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        const firstDay = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();
        const prevTotalDays = new Date(year, month, 0).getDate();

        const grid = useMemo(() => {
          const cells = [];
          for (let i = firstDay - 1; i >= 0; i--) {
            const pDay = prevTotalDays - i;
            const pMonth = month === 0 ? 12 : month;
            const pYear = month === 0 ? year - 1 : year;
            cells.push({ number: pDay, currMonth: false, dateStr: `${pYear}-${String(pMonth).padStart(2, '0')}-${String(pDay).padStart(2, '0')}` });
          }
          for (let d = 1; d <= totalDays; d++) {
            cells.push({ number: d, currMonth: true, dateStr: `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}` });
          }
          const leftOver = 42 - cells.length;
          for (let n = 1; n <= leftOver; n++) {
            const nMonth = month === 11 ? 1 : month + 2;
            const nYear = month === 11 ? year + 1 : year;
            cells.push({ number: n, currMonth: false, dateStr: `${nYear}-${String(nMonth).padStart(2, '0')}-${String(n).padStart(2, '0')}` });
          }
          return cells;
        }, [current, year, month]);

        const selectedTasks = tasks.filter(t => t.dueDate === selectedStr);

        return (
          <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
            <div className="md:col-span-2 bg-[#1F2833] p-4 rounded-2xl border border-brand-muted/15 flex flex-col justify-between h-full">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-1.5 text-sm font-bold text-brand-heading">
                  <span className="material-symbols-outlined text-brand-accent">event</span>
                  <span>{monthNames[month]} {year}</span>
                </div>
                <div className="flex items-center gap-1.5">
                  <button onClick={() => setCurrent(new Date(year, month - 1, 1))} className="p-1 px-2 border border-brand-muted/30 bg-brand-bg rounded-lg text-brand-muted hover:text-brand-accent cursor-pointer"><span className="material-symbols-outlined text-xs">chevron_left</span></button>
                  <button onClick={() => setCurrent(new Date())} className="px-2 py-1 text-[9px] uppercase tracking-wider font-extrabold border border-brand-muted/30 bg-brand-bg rounded-lg text-brand-muted hover:text-brand-accent cursor-pointer">Today</button>
                  <button onClick={() => setCurrent(new Date(year, month + 1, 1))} className="p-1 px-2 border border-brand-muted/30 bg-brand-bg rounded-lg text-brand-muted hover:text-brand-accent cursor-pointer"><span className="material-symbols-outlined text-xs">chevron_right</span></button>
                </div>
              </div>
              <div className="grid grid-cols-7 gap-1 text-center text-[9px] uppercase font-black text-brand-muted tracking-wider mb-2">
                {weekdayNames.map(d => <span key={d}>{d}</span>)}
              </div>
              <div className="grid grid-cols-7 gap-1 flex-1">
                {grid.map((cell, idx) => {
                  const dayTasks = tasks.filter(t => t.dueDate === cell.dateStr);
                  const isToday = new Date().toISOString().split('T')[0] === cell.dateStr;
                  const isSelected = selectedStr === cell.dateStr;
                  return (
                    <div key={idx} onClick={() => setSelectedStr(cell.dateStr)} className={`min-h-12 p-1 border rounded-lg cursor-pointer flex flex-col justify-between transition-all select-none ${cell.currMonth ? 'bg-brand-bg/50 border-brand-muted/5' : 'bg-brand-bg/10 border-transparent opacity-30'} ${isSelected ? 'ring-1 ring-brand-accent border-brand-accent bg-[#0B0C10]' : ''}`}>
                      <div className="flex justify-between items-center text-[9px] font-mono leading-none">
                        <span className={`${isToday ? 'bg-brand-accent text-brand-bg px-1 rounded-sm font-bold' : 'text-brand-heading'}`}>{cell.number}</span>
                        {dayTasks.length > 0 && <span className="text-[7px] text-brand-accent bg-brand-card px-1 rounded-sm font-black">{dayTasks.length}</span>}
                      </div>
                      <div className="flex gap-0.5 flex-wrap">
                        {dayTasks.slice(0, 3).map((t, k) => (
                          <span key={k} className={`w-1 h-1 rounded-full shrink-0 ${t.status === 'done' ? 'bg-emerald-400' : t.status === 'blocked' ? 'bg-red-400' : 'bg-blue-400'}`}></span>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="bg-[#1F2833] p-4 rounded-2xl border border-brand-muted/15 flex flex-col justify-between">
              <div>
                <div className="flex items-center gap-1.5 border-b border-brand-muted/10 pb-3 mb-4">
                  <span className="material-symbols-outlined text-brand-accent">schedule</span>
                  <div>
                    <h3 className="text-xs font-black text-brand-heading uppercase tracking-wider">{selectedStr}</h3>
                    <p className="text-[9px] text-brand-muted uppercase">Scanned day schedules</p>
                  </div>
                </div>
                <div className="space-y-2.5 max-h-[300px] overflow-y-auto pr-1">
                  {selectedTasks.length === 0 ? (
                    <div className="text-center py-10">
                      <span className="material-symbols-outlined text-brand-muted/40 text-3xl">inbox</span>
                      <p className="text-[10px] text-brand-muted mt-2">Zero active specs allocated.</p>
                    </div>
                  ) : (
                    selectedTasks.map(task => {
                      const user = teamMembers.find(m => m.id === task.assigneeId) || teamMembers[0];
                      return (
                        <div key={task.id} className="bg-brand-bg border border-brand-muted/10 p-2.5 rounded-xl space-y-1.5 shadow-sm">
                          <div className="flex items-center justify-between">
                            <span className={`text-[7px] font-bold px-1 rounded-sm uppercase ${task.priority === 'high' ? 'bg-red-950 text-red-400' : 'bg-blue-950 text-blue-400'}`}>{task.priority}</span>
                            <span className="text-[9px] font-mono text-brand-accent uppercase font-black">{task.status}</span>
                          </div>
                          <h4 className="text-[10px] font-bold text-brand-heading line-clamp-1">{task.title}</h4>
                          <div className="flex items-center gap-1 min-w-0">
                            <img src={user.avatar} className="w-4 h-4 rounded-full border border-brand-muted/40 shrink-0" />
                            <div className="flex flex-col min-w-0">
                              <span className="text-[8px] text-brand-text truncate">{user.name}</span>
                              <a href={`mailto:${user.email}`} className="text-[6px] text-brand-muted truncate hover:text-brand-accent transition-colors">{user.email}</a>
                            </div>
                          </div>
                        </div>
                      )
                    })
                  )}
                </div>
              </div>

              {showAdd ? (
                <form onSubmit={e => { e.preventDefault(); if (!qTitle.trim()) return; onAddTask({ title: qTitle.trim(), description: 'Created from calendar.', priority: 'medium', status: 'to-do', assigneeId: qAssignee, dueDate: selectedStr }); setQTitle(''); setShowAdd(false); }} className="mt-4 pt-4 border-t border-brand-muted/10 space-y-2.5">
                  <div className="flex flex-col gap-1">
                    <label className="text-[8px] font-bold text-brand-muted uppercase">Task *</label>
                    <input type="text" required placeholder="e.g. Refresh certificates" value={qTitle} onChange={e => setQTitle(e.target.value)} className="bg-brand-bg p-2 text-xs rounded-lg border border-brand-muted/20 text-brand-heading w-full outline-none" />
                  </div>
                  <div className="flex flex-col gap-1">
                    <label className="text-[8px] font-bold text-brand-muted uppercase">Assignee</label>
                    <select value={qAssignee} onChange={e => setQAssignee(e.target.value)} className="bg-brand-bg p-1 text-xs rounded-lg border border-brand-muted/20 text-brand-heading w-full outline-none">
                      {teamMembers.length === 0 ? <option value="">Unassigned</option> : teamMembers.map(m => <option key={m.id} value={m.id}>{m.name} — {m.email}</option>)}
                    </select>
                  </div>
                  <div className="flex gap-2 pt-1.5">
                    <button type="button" onClick={() => setShowAdd(false)} className="flex-1 py-1 bg-brand-bg hover:bg-neutral-800 text-[10px] font-extrabold text-brand-muted uppercase tracking-wider rounded-lg border border-brand-muted/20 transition-all font-mono cursor-pointer">Cancel</button>
                    <button type="submit" className="flex-1 py-1 bg-brand-accent text-brand-bg hover:opacity-90 text-[10px] uppercase tracking-wider font-extrabold rounded-lg transition-all cursor-pointer">Save</button>
                  </div>
                </form>
              ) : (
                <button onClick={() => setShowAdd(true)} className="w-full mt-4 py-2 border border-dashed border-brand-muted/30 hover:border-brand-accent/40 rounded-xl text-center text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-1 text-brand-muted hover:text-brand-accent transition-all cursor-pointer">
                  <span className="material-symbols-outlined text-xs">add_link</span> Schedule Quick Task
                </button>
              )}
            </div>
          </div>
        );
      }

      // ══════════════════════════════════════════════════════════════════════
      //  TEAM VIEW
      // ══════════════════════════════════════════════════════════════════════
      function TeamView({ teamMembers, tasks, onAddTeamMember }) {
        const [filter, setFilter] = useState('');
        const [isNewOpen, setIsNewOpen] = useState(false);
        const [nName, setNName] = useState('');
        const [nRole, setNRole] = useState('');
        const [nEmail, setNEmail] = useState('');

        const teamFiltered = useMemo(() => {

        return (
          <div className="space-y-4">

                <span className="material-symbols-outlined absolute left-2.5 top-1/2 transform -translate-y-1/2 text-brand-muted text-sm">group</span>

              </div>
              <button onClick={() => setIsNewOpen(!isNewOpen)} className="py-1.5 px-3 bg-brand-accent hover:opacity-90 text-brand-bg font-extrabold text-[10px] uppercase tracking-wider rounded-xl transition-all cursor-pointer flex items-center gap-1 shrink-0">
                <span className="material-symbols-outlined text-xs">person_add</span> Onboard Builder
              </button>
            </div>

            {isNewOpen && (
              <div className="bg-[#1F2833] p-4 rounded-2xl border border-brand-accent/25 space-y-3">
                <h3 className="text-xs font-black uppercase text-brand-accent tracking-wider flex items-center gap-1.5"><span className="material-symbols-outlined text-sm">join_inner</span> Register Team Member</h3>
                <form onSubmit={e => { e.preventDefault(); if (!nName.trim() || !nRole.trim() || !nEmail.trim()) return; const avatarUrl = nAvatar === 'woman' ? `https://images.unsplash.com/photo-${['1494790108377-be9c29b29330','1438761681033-6461ffad8d80','1534528741775-53994a69daeb'][Math.floor(Math.random()*3)]}?auto=format&fit=crop&q=80&w=200&h=200` : `https://images.unsplash.com/photo-${['1535713875002-d1d0cf377fde','1507003211169-0a1dd7228f2d','1500648767791-00dcc994a43e'][Math.floor(Math.random()*3)]}?auto=format&fit=crop&q=80&w=200&h=200`; onAddTeamMember({ name: nName.trim(), role: nRole.trim(), email: nEmail.trim(), avatar: avatarUrl }); setNName(''); setNRole(''); setNEmail(''); setIsNewOpen(false); }} className="grid grid-cols-1 sm:grid-cols-4 gap-3 items-end">
                  <div className="flex flex-col gap-1">
                    <label className="text-[8px] font-bold text-brand-muted uppercase">Full Name *</label>
                    <input type="text" required placeholder="Liam Perez" value={nName} onChange={e => setNName(e.target.value)} className="bg-brand-bg p-2 text-xs rounded-xl border border-brand-muted/20 text-brand-heading outline-none w-full" />
                  </div>
                  <div className="flex flex-col gap-1">
                    <label className="text-[8px] font-bold text-brand-muted uppercase">Role *</label>
                    <input type="text" required placeholder="QA specialist" value={nRole} onChange={e => setNRole(e.target.value)} className="bg-brand-bg p-2 text-xs rounded-xl border border-brand-muted/20 text-brand-heading outline-none w-full" />
                  </div>
                  <div className="flex flex-col gap-1">
                    <label className="text-[8px] font-bold text-brand-muted uppercase">Email *</label>
                    <input type="email" required placeholder="name@company.co" value={nEmail} onChange={e => setNEmail(e.target.value)} className="bg-brand-bg p-2 text-xs rounded-xl border border-brand-muted/20 text-brand-heading outline-none w-full" />
                  </div>
                  <div className="flex gap-2">
                    <div className="flex-1 flex flex-col gap-1">
                      <label className="text-[8px] font-bold text-brand-muted uppercase">Avatar</label>
                      <select value={nAvatar} onChange={e => setNAvatar(e.target.value)} className="bg-brand-bg p-1.5 text-xs rounded-xl border border-brand-muted/20 text-brand-heading outline-none">
                        <option value="woman">Woman</option>
                        <option value="man">Man</option>

                    <button type="submit" className="py-2 px-3 bg-brand-accent hover:opacity-90 text-brand-bg font-extrabold text-[10px] uppercase tracking-wider rounded-xl transition-all font-mono h-9 cursor-pointer">Save</button>
                  </div>
                </form>
              </div>
            )}

            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
              {teamFiltered.map((member) => {
                const assigned = tasks.filter(t => t.assigneeId === member.id && t.status !== 'done');
                const completed = tasks.filter(t => t.assigneeId === member.id && t.status === 'done');
                return (
                  <div key={member.id} className="bg-[#1F2833] border border-brand-muted/15 p-4 rounded-xl flex items-start gap-3.5 hover:border-brand-accent/20 transition-all">
                    <img src={member.avatar} className="w-12 h-12 rounded-full object-cover border-2 border-brand-accent shrink-0 shadow-sm" />

                        <div className="flex flex-col">

                          <span className="text-[7px] uppercase tracking-wider text-brand-muted font-bold">Done</span>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

                <span className="text-red-400 font-black uppercase text-[10px] tracking-widest flex items-center gap-1"><span className="material-symbols-outlined text-sm">warning</span> Factory Reset</span>
                <p className="text-[9px] text-brand-text leading-relaxed">Clears all local data and reloads the application.</p>
                <button onClick={async () => { if (confirm('Reset all data?')) { if (canUseDB()) { try { await db.ref().set(null); } catch (e) {} } localStorage.removeItem(STORAGE_KEY); window.location.reload(); }}} className="w-full py-1.5 bg-red-950 hover:bg-red-900 border border-red-500/30 text-red-100 uppercase font-black text-[9px] tracking-widest rounded-lg cursor-pointer transition-all flex items-center justify-center gap-1">
                  <span className="material-symbols-outlined text-xs">restart_alt</span> Flash Sandbox
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ─── Bootstrap ──────────────────────────────────────────────────────────
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
